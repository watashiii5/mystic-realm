<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mystic Realm</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas { display: block; margin: 0 auto; }
    #loading { color: #ffcc00; font-family: monospace; font-size: 18px;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; }
    #error { color: #ff4444; font-family: monospace; font-size: 14px;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; max-width: 80%; display: none; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="loading">Mystic Realm loading...</div>
  <div id="error"></div>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      var el = document.getElementById('error');
      el.textContent = 'ERROR: ' + msg + '\n' + (err ? err.stack : '');
      el.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
    };
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('error');
      el.textContent = 'PROMISE ERROR: ' + e.reason;
      el.style.display = 'block';
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.86.0/phaser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.8.3/dist/socket.io.min.js"></script>
  <script src="/src/network/Network.js"></script>
  <script src="/src/audio/SoundManager.js"></script>
  <script src="/src/ui/SettingsPanel.js"></script>
  <script src="/src/ui/Minimap.js"></script>
  <script src="/src/ui/ParticleSystem.js"></script>
  <script src="/src/scenes/BootScene.js"></script>
  <script src="/src/scenes/MenuScene.js"></script>
  <script src="/src/scenes/CharCreateScene.js"></script>
  <script src="/src/scenes/GameScene.js"></script>
  <script src="/src/main.js"></script>
</body>
</html>
